<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Bank Statement Parser</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0f172a; margin: 0; color: #fff; }
        .card { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 450px; }
        
        /* Drag & Drop Zone Styling */
        .drop-zone { border: 2px dashed #3b82f6; border-radius: 12px; padding: 40px 20px; margin: 20px 0; cursor: pointer; transition: all 0.3s ease; background: #0f172a; }
        .drop-zone.dragover { background: #3b82f6; border-color: #fff; color: #fff; }
        .drop-zone p { margin: 0; font-size: 16px; color: #94a3b8; }
        .drop-zone.dragover p { color: #fff; }
        
        input[type="file"] { display: none; }
        button { background: #3b82f6; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        .status { margin-top: 15px; font-size: 14px; color: #34d399; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Statement to Excel</h2>
    
    <div class="drop-zone" id="dropZone">
        <p id="dropText">Drag & Drop PDF here<br>or click to browse</p>
        <input type="file" id="pdfFile" accept="application/pdf">
    </div>

    <button id="convertBtn" disabled>Upload & Convert</button>
    <div class="status" id="statusText">Processing file on server...</div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('pdfFile');
    const convertBtn = document.getElementById('convertBtn');
    const statusText = document.getElementById('statusText');
    const dropText = document.getElementById('dropText');
    let selectedFile = null;

    // Drag & Drop Events
    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            handleFileSelection(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => handleFileSelection(e.target.files[0]));

    function handleFileSelection(file) {
        if (file.type !== 'application/pdf') return alert('Only PDF files are allowed.');
        selectedFile = file;
        dropText.innerHTML = `Selected: <strong>${file.name}</strong>`;
        convertBtn.disabled = false;
    }

    // Upload & Download Logic
    convertBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        const formData = new FormData();
        formData.append('statement', selectedFile);

        convertBtn.disabled = true;
        statusText.style.display = 'block';
        statusText.innerText = "Extracting data...";

        try {
            const response = await fetch('https://bank-statement-extractor-lwvc.onrender.com/api/convert', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error("Conversion failed on server.");

            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `Parsed_${selectedFile.name.replace('.pdf', '')}.xlsx`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            
            statusText.innerText = "Success! File downloaded.";
            statusText.style.color = "#34d399";
        } catch (error) {
            statusText.innerText = "Error: Could not convert file.";
            statusText.style.color = "#ef4444";
        } finally {
            setTimeout(() => {
                convertBtn.disabled = false;
                statusText.style.display = 'none';
            }, 3000);
        }
    });
</script>

</body>
  </html>
